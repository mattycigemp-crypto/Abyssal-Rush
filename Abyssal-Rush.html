<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ABYSSAL RUSH: DEEP DIVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #020510 0%, #0a1a3a 50%, #020510 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; font-family: 'Courier New', monospace;
      user-select: none;
    }
    #wrap {
      position: relative; display: inline-block;
      box-shadow: 0 0 60px rgba(0, 200, 255, 0.5), 0 0 120px rgba(0, 100, 200, 0.3);
      border-radius: 8px;
    }
    canvas {
      display: block; border: 3px solid #00aaff; outline: none;
      border-radius: 8px; image-rendering: pixelated;
      width: 900px; height: 506px; background: #010a15;
    }
    #hint {
      color: #0af; font-size: 13px; text-align: center; margin-top: 12px;
      opacity: 0.9; font-weight: bold; text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
    }
    #mobile-controls {
      position: absolute; bottom: 20px; left: 0; width: 100%;
      display: flex; justify-content: space-between; padding: 0 30px;
      pointer-events: none; z-index: 100;
    }
    .ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
    .btn {
      width: 70px; height: 70px;
      background: rgba(0, 200, 255, 0.1);
      border: 2px solid rgba(0, 200, 255, 0.5);
      color: #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; backdrop-filter: blur(4px);
      transition: all 0.1s; user-select: none; touch-action: manipulation;
    }
    .btn:active { background: rgba(0, 255, 255, 0.4); transform: scale(0.9); border-color: #fff; }
    .btn.action { border-color: #f0f; color: #f0f; }
    .btn.action:active { background: rgba(255, 0, 255, 0.4); }
    
    @media(max-width: 950px) {
      canvas { width: 100vw; height: 56.25vw; }
      #btns { display: none; }
      #hint { margin-top: 5px; font-size: 11px; }
    }
    @media(min-width: 951px) {
      #mobile-controls { display: none; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="900" height="506" tabindex="0"></canvas>
    
    <div id="mobile-controls">
      <div class="ctrl-group">
        <button class="btn" id="bleft">◀</button>
        <button class="btn" id="bright">▶</button>
      </div>
      <div class="ctrl-group">
        <button class="btn action" id="bdash">◆</button>
        <button class="btn" id="bjump">▲</button>
      </div>
    </div>
  </div>
  <div id="hint">DETECTING DEVICE...</div>

  <script>
    /**
     * ABYSSAL RUSH: DEEP DIVE
     * Enhanced underwater platformer with power-ups, boss battles, and deep progression
     */

    // --- CONFIGURATION ---
    const CFG = {
      W: 900, H: 506,
      GRAV: 0.28, MAX_FALL: 11,
      ACCEL: 0.28, DECEL: 0.92, AIR_ACCEL: 0.18, AIR_DECEL: 0.97, MAX_SPD: 7.5,
      JUMP_FORCE: -6.5, JUMP_HOLD: 12, DOUBLE_JUMP_FORCE: -5.5,
      COYOTE_TIME: 8, JUMP_BUFFER: 8,
      DASH_SPD: 14, DASH_TIME: 10, DASH_CD: 25,
      WALL_SLIDE: 1.2, WALL_JUMP_X: 5.5, WALL_JUMP_Y: -6.5,
      IFRAMES: 100, KNOCKBACK: 5
    };

    const STATE = { TITLE: 0, PLAY: 1, PAUSE: 2, DEAD: 3, WIN: 4, LEVEL_TRANSITION: 5, CHAR_SELECT: 6, MODE_SELECT: 7 };
    const POWERUP_TYPES = ['SHIELD', 'MAGNET', 'SPEED', 'DOUBLE_JUMP', 'EXTRA_LIFE'];
    const CHARACTERS = [
      { id: 0, name: 'DIVER', col: '#0af', lives: 3, spd: 7.5, jump: -6.5, dash: 14, desc: 'BALANCED: The classic explorer.' },
      { id: 1, name: 'NEO', col: '#0ff', lives: 2, spd: 10.0, jump: -7.5, dash: 18, desc: 'SCOUT: Fast but fragile.' },
      { id: 2, name: 'AEGIS', col: '#0f8', lives: 5, spd: 5.5, jump: -5.5, dash: 11, desc: 'TANK: Can take a beating.' }
    ];
    const MODES = [
      { id: 0, name: 'ADVENTURE', desc: 'STORY: EXPLORE THE REEF' },
      { id: 1, name: 'SURVIVAL', desc: 'ENDLESS: DIVE UNTIL DEATH' }
    ];

    // --- ENHANCED AUDIO SYSTEM ---
    const AudioSys = (() => {
      let ctx = null, masterGain = null, musicOsc = null;
      const init = () => {
        if (!ctx) {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          masterGain = ctx.createGain();
          masterGain.gain.value = 0.4;
          masterGain.connect(ctx.destination);
        }
      };

      const playTone = (freqs, type, dur, vol = 0.15, when = 0) => {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(masterGain);

        const t = ctx.currentTime + when;
        osc.frequency.setValueAtTime(freqs[0], t);
        if (freqs.length > 1) osc.frequency.exponentialRampToValueAtTime(freqs[1], t + dur);

        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

        osc.start(t);
        osc.stop(t + dur);
        return osc;
      };

      const playChord = (freqs, dur, vol = 0.12) => {
        if (!ctx) return;
        freqs.forEach((f, i) => setTimeout(() => playTone([f, f * 1.5], 'sine', dur, vol), i * 50));
      };

      return {
        init,
        jump: () => playTone([300, 550], 'sine', 0.22, 0.2),
        doubleJump: () => playTone([400, 700], 'sine', 0.2, 0.18),
        spring: () => playChord([200, 300, 500, 800], 0.35, 0.2),
        dash: () => playTone([600, 150], 'sawtooth', 0.2, 0.15),
        hit: () => playTone([200, 40], 'sawtooth', 0.4, 0.35),
        pickup: () => playTone([880, 1200], 'sine', 0.12, 0.12),
        ringCollect: () => playChord([660, 880], 0.1, 0.1),
        powerUp: () => playChord([440, 554, 659, 880], 0.5, 0.25),
        scatter: () => playTone([1000, 300], 'square', 0.35, 0.18),
        enemyDie: () => playTone([180, 35], 'sawtooth', 0.25, 0.22),
        enemyHit: () => playTone([250, 100], 'square', 0.15, 0.18),
        checkpoint: () => playChord([330, 440, 554, 659], 0.6, 0.22),
        bossHit: () => playTone([150, 80], 'sawtooth', 0.3, 0.3),
        levelComplete: () => playChord([523, 659, 783, 1046], 1.0, 0.3),
        extraLife: () => playChord([440, 554, 659, 880, 1108], 0.8, 0.25),
        gameOver: () => playTone([300, 60], 'sawtooth', 1.5, 0.4)
      };
    })();

    // --- INPUT SYSTEM ---
    const Input = {
      keys: {}, prev: {},
      left: false, right: false, jump: false, dash: false,
      isMobile: false,
      update() {
        this.left = this.keys['ArrowLeft'] || this.keys['KeyA'];
        this.right = this.keys['ArrowRight'] || this.keys['KeyD'];
        this.jump = this.keys['Space'] || this.keys['ArrowUp'] || this.keys['KeyW'] || this.keys['KeyZ'] || this.keys['KeyC'];
        this.dash = this.keys['KeyX'] || this.keys['ShiftLeft'] || this.keys['ShiftRight'];
      },
      postUpdate() { this.prevJump = this.jump; this.prevDash = this.dash; },
      justPressed(key) {
        if (key === 'Jump') return this.jump && !this.prevJump;
        if (key === 'Dash') return this.dash && !this.prevDash;
        return this.keys[key] && !this.prev[key];
      },
      bind() {
        this.isMobile = window.matchMedia("(pointer: coarse)").matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const hint = document.getElementById('hint');
        if (this.isMobile) {
          hint.innerHTML = 'TAP CONTROLS TO MOVE & ACTIONS';
        } else {
          hint.innerHTML = 'ARROWS/WASD = Move | SPACE/Z = Jump | X/SHIFT = Dash | P = Pause';
        }

        window.addEventListener('keydown', e => {
          this.keys[e.code] = true;
          if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
          if (e.code === 'KeyP' || e.code === 'Escape') GameState.togglePause();
          AudioSys.init();
        });
        window.addEventListener('keyup', e => { this.keys[e.code] = false; });

        const bindBtn = (id, prop) => {
          const el = document.getElementById(id);
          const start = (e) => { e.preventDefault(); this.keys[prop] = true; AudioSys.init(); };
          const end = (e) => { e.preventDefault(); this.keys[prop] = false; };
          el.addEventListener('mousedown', start);
          el.addEventListener('mouseup', end);
          el.addEventListener('touchstart', start, {passive: false});
          el.addEventListener('touchend', end, {passive: false});
        };
        bindBtn('bleft', 'ArrowLeft'); bindBtn('bright', 'ArrowRight');
        bindBtn('bjump', 'Space'); bindBtn('bdash', 'KeyX');
      }
    };

    // --- MATH UTILITIES ---
    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const AABB = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

    // --- LEVEL DATA ---
    const LEVELS = [
      { // Level 1: Tutorial Reef
        w: 4000, h: 1000, spawn: { x: 150, y: 700 },
        platforms: [
          { x: 0, y: 800, w: 800, h: 200 }, { x: 900, y: 700, w: 300, h: 30 },
          { x: 1300, y: 600, w: 200, h: 30 }, { x: 1600, y: 500, w: 300, h: 30 },
          { x: 2000, y: 650, w: 800, h: 350 }, { x: 2900, y: 550, w: 150, h: 30 },
          { x: 3200, y: 450, w: 150, h: 30 }, { x: 3500, y: 650, w: 600, h: 350 },
          { x: -100, y: 0, w: 100, h: 1000 }, { x: 4000, y: 0, w: 100, h: 1000 }
        ],
        springs: [{ x: 700, y: 790, force: -12 }, { x: 2150, y: 640, force: -14 }],
        hazards: [{ x: 1000, y: 880, w: 400, h: 20 }],
        enemies: [
          { type: 'eel', x: 2100, y: 610 }, { type: 'jelly', x: 1700, y: 460 },
          { type: 'eel', x: 3600, y: 610 }
        ],
        rings: [
          { x: 300, y: 750 }, { x: 350, y: 720 }, { x: 400, y: 750 },
          { x: 1000, y: 650 }, { x: 1400, y: 550 }, { x: 1750, y: 450 },
          { x: 2200, y: 600 }, { x: 2400, y: 600 }, { x: 2600, y: 600 },
          { x: 3700, y: 600 }
        ],
        powerups: [{ x: 3300, y: 420, type: 'DOUBLE_JUMP' }],
        checkpoints: [{ x: 1500, y: 720 }, { x: 2500, y: 650 }],
        boss: null
      },
      { // Level 2: Abyssal Trench
        w: 5500, h: 1200, spawn: { x: 100, y: 800 },
        platforms: [
          { x: 0, y: 900, w: 500, h: 300 }, { x: 600, y: 800, w: 200, h: 30 },
          { x: 900, y: 700, w: 150, h: 30 }, { x: 1150, y: 600, w: 150, h: 30 },
          { x: 1400, y: 800, w: 600, h: 400 }, { x: 2100, y: 700, w: 200, h: 30 },
          { x: 2400, y: 600, w: 200, h: 30 }, { x: 2700, y: 500, w: 200, h: 30 },
          { x: 3000, y: 750, w: 1000, h: 450 }, { x: 4100, y: 650, w: 200, h: 30 },
          { x: 4400, y: 550, w: 200, h: 30 }, { x: 4700, y: 800, w: 900, h: 400 },
          { x: -100, y: 0, w: 100, h: 1200 }, { x: 5500, y: 0, w: 100, h: 1200 }
        ],
        springs: [
          { x: 450, y: 890, force: -14 }, { x: 2350, y: 590, force: -16 },
          { x: 4800, y: 790, force: -18 }
        ],
        hazards: [
          { x: 500, y: 980, w: 100, h: 20 }, { x: 1500, y: 980, w: 500, h: 20 },
          { x: 3200, y: 980, w: 800, h: 20 }
        ],
        enemies: [
          { type: 'eel', x: 1500, y: 760 }, { type: 'jelly', x: 800, y: 750 },
          { type: 'turret', x: 3200, y: 710 }, { type: 'eel', x: 3500, y: 710 },
          { type: 'jelly', x: 4200, y: 610 }, { type: 'shark', x: 4850, y: 760 },
          { type: 'eel', x: 5100, y: 760 }
        ],
        rings: [
          { x: 250, y: 850 }, { x: 650, y: 750 }, { x: 950, y: 650 },
          { x: 1220, y: 550 }, { x: 1600, y: 750 }, { x: 1800, y: 750 },
          { x: 2200, y: 650 }, { x: 2500, y: 550 }, { x: 2800, y: 450 },
          { x: 3300, y: 700 }, { x: 3500, y: 700 }, { x: 3700, y: 700 },
          { x: 4200, y: 600 }, { x: 4900, y: 750 }
        ],
        powerups: [
          { x: 2800, y: 470, type: 'SHIELD' },
          { x: 5000, y: 770, type: 'MAGNET' }
        ],
        checkpoints: [{ x: 2000, y: 820 }, { x: 3800, y: 720 }],
        boss: null
      },
      { // Level 3: Boss Arena
        w: 3000, h: 1000, spawn: { x: 200, y: 700 },
        platforms: [
          { x: 0, y: 800, w: 600, h: 200 }, { x: 700, y: 700, w: 200, h: 30 },
          { x: 1000, y: 600, w: 200, h: 30 }, { x: 1300, y: 700, w: 400, h: 30 },
          { x: 1800, y: 600, w: 200, h: 30 }, { x: 2100, y: 700, w: 200, h: 30 },
          { x: 2400, y: 800, w: 700, h: 200 },
          { x: -100, y: 0, w: 100, h: 1000 }, { x: 3000, y: 0, w: 100, h: 1000 }
        ],
        springs: [
          { x: 550, y: 790, force: -14 }, { x: 1250, y: 590, force: -14 },
          { x: 1750, y: 590, force: -14 }
        ],
        hazards: [{ x: 1400, y: 980, w: 200, h: 20 }],
        enemies: [
          { type: 'eel', x: 800, y: 660 }, { type: 'jelly', x: 1500, y: 650 },
          { type: 'turret', x: 2500, y: 760 }
        ],
        rings: [
          { x: 350, y: 750 }, { x: 750, y: 650 }, { x: 1100, y: 550 },
          { x: 1900, y: 550 }, { x: 2200, y: 650 }, { x: 2600, y: 750 }
        ],
        powerups: [{ x: 1500, y: 670, type: 'EXTRA_LIFE' }],
        checkpoints: [{ x: 1000, y: 620 }],
        boss: { x: 2000, y: 500, type: 'leviathan' }
      }
    ];

    // --- PARTICLE SYSTEM ---
    const FX = {
      particles: [], bubbles: [],
      spawn(x, y, col, count, opts = {}) {
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x, y,
            vx: opts.vx + (Math.random() - 0.5) * (opts.speed || 4) * 2,
            vy: opts.vy + (Math.random() - 0.5) * (opts.speed || 4) * 2,
            life: 1, maxLife: opts.life || 1,
            lifeSp: (opts.decay || 0.03) + Math.random() * 0.02,
            col, size: opts.size || 3,
            gravity: opts.gravity !== false
          });
        }
      },
      spawnBubble(x, y) {
        this.bubbles.push({
          x, y, vy: -0.5 - Math.random(),
          size: 2 + Math.random() * 4, life: 1,
          wobble: Math.random() * Math.PI * 2
        });
      },
      update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          let p = this.particles[i];
          p.x += p.vx; p.y += p.vy;
          p.vx *= 0.96; p.vy *= 0.96;
          if (p.gravity) p.vy += 0.08;
          p.life -= p.lifeSp;
          if (p.life <= 0) this.particles.splice(i, 1);
        }
        for (let i = this.bubbles.length - 1; i >= 0; i--) {
          let b = this.bubbles[i];
          b.y += b.vy;
          b.x += Math.sin(Date.now() / 500 + b.wobble) * 0.3;
          b.life -= 0.005;
          if (b.life <= 0) this.bubbles.splice(i, 1);
        }
      },
      draw(ctx, camX, camY) {
        ctx.globalCompositeOperation = 'lighter';
        for (let p of this.particles) {
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.col;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.5, p.life * p.size), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#88ccff';
        for (let b of this.bubbles) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.size * b.life, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    };

    // --- ENTITY BASE ---
    class Entity {
      constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.vx = 0; this.vy = 0; this.alive = true;
      }
      moveX(platforms) {
        this.x += this.vx;
        for (let p of platforms) {
          if (AABB(this, p)) {
            if (this.vx > 0) { this.x = p.x - this.w; this.vx = 0; }
            else if (this.vx < 0) { this.x = p.x + p.w; this.vx = 0; }
            return true;
          }
        }
        return false;
      }
      moveY(platforms) {
        this.y += this.vy;
        let ground = false;
        for (let p of platforms) {
          if (AABB(this, p)) {
            if (this.vy > 0) { this.y = p.y - this.h; ground = true; }
            else if (this.vy < 0) { this.y = p.y + p.h; }
            this.vy = 0;
          }
        }
        return ground;
      }
    }

    // --- SCATTERED RINGS ---
    class ScatteredRing extends Entity {
      constructor(x, y) {
        super(x, y, 14, 14);
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 3;
        this.timer = 200; this.blink = false;
      }
      update(platforms) {
        this.vy += CFG.GRAV * 0.8;
        this.moveX(platforms);
        if (this.moveY(platforms)) {
          this.vx *= 0.85;
          if (Math.abs(this.vy) > 2) this.vy = -this.vy * 0.4;
        }
        this.timer--;
        this.blink = this.timer < 80 && Math.floor(this.timer / 5) % 2 === 0;
        if (this.timer <= 0) this.alive = false;
      }
    }

    // --- POWER-UP ---
    class PowerUp extends Entity {
      constructor(cfg) {
        super(cfg.x, cfg.y, 24, 24);
        this.type = cfg.type;
        this.baseY = cfg.y;
        this.collected = false;
        this.pulse = 0;
      }
      update() {
        this.pulse += 0.1;
        this.y = this.baseY + Math.sin(this.pulse) * 3;
      }
      draw(ctx, camX, camY) {
        if (this.collected) return;
        const colors = {
          SHIELD: '#00ff88', MAGNET: '#ff66ff', SPEED: '#ffaa00',
          DOUBLE_JUMP: '#00ccff', EXTRA_LIFE: '#ff4444'
        };
        const icons = {
          SHIELD: 'S', MAGNET: 'M', SPEED: '>>', DOUBLE_JUMP: '2J', EXTRA_LIFE: '1UP'
        };

        ctx.shadowColor = colors[this.type];
        ctx.shadowBlur = 15 + Math.sin(this.pulse * 2) * 5;
        ctx.fillStyle = colors[this.type];
        ctx.beginPath();
        ctx.arc(this.x + 12, this.y + 12, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(icons[this.type], this.x + 12, this.y + 16);
        ctx.shadowBlur = 0;
      }
    }

    // --- PROJECTILE ---
    class Projectile extends Entity {
      constructor(x, y, vx, vy, owner) {
        super(x, y, 8, 8);
        this.vx = vx; this.vy = vy;
        this.owner = owner; // 'player' or 'enemy'
        this.life = 120;
      }
      update(platforms) {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        if (this.life <= 0) this.alive = false;

        for (let p of platforms) {
          if (AABB(this, p)) { this.alive = false; FX.spawn(this.x, this.y, '#0af', 3); }
        }
      }
      draw(ctx, camX, camY) {
        ctx.fillStyle = this.owner === 'player' ? '#0ff' : '#f44';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(this.x + 4, this.y + 4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // --- PLAYER ---
    class Player extends Entity {
      constructor() {
        super(0, 0, 18, 28);
        this.lives = 3;
        this.maxLives = 5;
        this.stats = CHARACTERS[0];
      }
      reset(x, y, charData = null) {
        if (charData) this.stats = charData;
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.alive = true; this.inv = CFG.IFRAMES;
        this.lives = this.lives || this.stats.lives;
        this.coyote = 0; this.buffer = 0; this.jumpHold = 0;
        this.dashTime = 0; this.dashCd = 0; this.face = 1;
        this.wallSlide = 0; this.onGround = false;
        this.doubleJump = false; this.hasDoubleJump = false;
        this.shield = false; this.magnet = false; this.speedBoost = 0;
      }

      update(platforms, hazards, springs) {
        if (!this.alive) return;

        // Apply power-up effects
        const maxSpd = this.speedBoost > 0 ? this.stats.spd * 1.5 : this.stats.spd;
        if (this.speedBoost > 0) this.speedBoost--;

        // Dash
        if (Input.justPressed('Dash') && this.dashCd <= 0) {
          this.dashTime = CFG.DASH_TIME;
          this.dashCd = CFG.DASH_CD;
          this.vx = this.face * this.stats.dash;
          this.vy = 0;
          AudioSys.dash();
          FX.spawn(this.x + 9, this.y + 14, this.stats.col, 12, { vx: -this.face * 3, speed: 3, life: 0.5 });
        }

        if (this.dashTime > 0) {
          this.dashTime--;
          this.vy = 0;
          if (this.dashTime % 2 === 0) {
            FX.spawn(this.x + 9, this.y + 14, this.stats.col, 2, { vx: 0, vy: 0, speed: 2, life: 0.3 });
          }
        } else {
          let dir = (Input.right ? 1 : 0) - (Input.left ? 1 : 0);
          if (dir !== 0) this.face = dir;

          let accel = this.onGround ? CFG.ACCEL : CFG.AIR_ACCEL;
          let decel = this.onGround ? CFG.DECEL : CFG.AIR_DECEL;
          if (this.speedBoost > 0) { accel *= 1.3; }

          if (dir !== 0) {
            this.vx += dir * accel;
            if (Math.abs(this.vx) > maxSpd) this.vx = Math.sign(this.vx) * maxSpd;
          } else {
            this.vx *= decel;
            if (Math.abs(this.vx) < 0.15) this.vx = 0;
          }

          this.vy += CFG.GRAV;
          if (this.vy > CFG.MAX_FALL) this.vy = CFG.MAX_FALL;

          // Wall slide
          if (this.wallSlide !== 0 && this.vy > 0 && dir === this.wallSlide) {
            this.vy = CFG.WALL_SLIDE;
            if (Math.random() < 0.2) FX.spawnBubble(this.x + (this.face === 1 ? this.w : 0), this.y + this.h);
          }

          // Coyote time
          if (this.onGround) { this.coyote = CFG.COYOTE_TIME; this.doubleJump = false; }
          else if (this.coyote > 0) this.coyote--;

          // Jump buffer
          if (Input.justPressed('Jump')) this.buffer = CFG.JUMP_BUFFER;
          else if (this.buffer > 0) this.buffer--;

          // Jump execution
          if (this.buffer > 0) {
            if (this.coyote > 0) {
              this.vy = this.stats.jump;
              this.jumpHold = CFG.JUMP_HOLD;
              this.coyote = 0; this.buffer = 0;
              AudioSys.jump();
              FX.spawn(this.x + 9, this.y + 28, this.stats.col, 6, { vx: 0, vy: 2, speed: 3 });
              for (let i = 0; i < 3; i++) FX.spawnBubble(this.x + Math.random() * this.w, this.y + this.h);
            } else if (this.wallSlide !== 0) {
              this.vy = CFG.WALL_JUMP_Y;
              this.vx = -this.wallSlide * CFG.WALL_JUMP_X;
              this.wallSlide = 0; this.buffer = 0;
              this.face = Math.sign(this.vx);
              AudioSys.jump();
              FX.spawn(this.x + 9, this.y + 14, this.stats.col, 6);
            } else if (this.hasDoubleJump && !this.doubleJump) {
              // Double jump!
              this.vy = CFG.DOUBLE_JUMP_FORCE;
              this.doubleJump = true;
              this.buffer = 0;
              this.jumpHold = CFG.JUMP_HOLD;
              AudioSys.doubleJump();
              FX.spawn(this.x + 9, this.y + 28, '#ff0', 10, { vx: 0, vy: 3, speed: 4 });
              FX.spawnBubble(this.x + 5, this.y + 20);
              FX.spawnBubble(this.x + 13, this.y + 20);
            }
          }

          // Variable jump height
          if (Input.jump && this.jumpHold > 0) {
            this.vy = this.doubleJump ? CFG.DOUBLE_JUMP_FORCE : this.stats.jump;
            this.jumpHold--;
          } else {
            this.jumpHold = 0;
          }
        }

        if (this.dashCd > 0) this.dashCd--;
        if (this.inv > 0) this.inv--;

        let hitWall = this.moveX(platforms);
        this.wallSlide = hitWall && !this.onGround && this.vy > 0 ? Math.sign(this.vx || this.face) : 0;
        this.onGround = this.moveY(platforms);

        // Hazard collision
        for (let h of hazards) {
          if (AABB(this, h)) {
            if (this.shield) { this.shield = false; this.inv = 60; FX.spawn(this.x, this.y, '#0f8', 15); }
            else this.takeDamage();
          }
        }

        // Spring collision
        for (let s of springs) {
          if (this.vy >= 0 && AABB(this, { x: s.x, y: s.y - 10, w: 30, h: 10 })) {
            this.vy = s.force; this.buffer = 0; this.jumpHold = 0;
            this.onGround = false; this.doubleJump = false;
            AudioSys.spring();
            FX.spawn(s.x + 15, s.y, '#fff', 20, { vx: 0, vy: -4, speed: 5 });
            for (let i = 0; i < 5; i++) FX.spawnBubble(s.x + 15, s.y);
          }
        }

        // Magnet effect
        if (this.magnet && GameState.state === STATE.PLAY) {
          for (let r of GameState.rings) {
            if (!r.col && dist(this, { x: r.x, y: r.y }) < 120) {
              const dx = (this.x + 9) - r.x;
              const dy = (this.y + 14) - r.y;
              const d = Math.hypot(dx, dy);
              if (d > 10) {
                r.x += (dx / d) * 4;
                r.y += (dy / d) * 4;
              }
            }
          }
        }
      }

      takeDamage() {
        if (this.inv > 0 || !this.alive) return;

        if (GameState.stats.rings > 0) {
          let scatterCount = Math.min(25, Math.floor(GameState.stats.rings / 2) + 2);
          for (let i = 0; i < scatterCount; i++) {
            GameState.scatteredRings.push(new ScatteredRing(this.x + 9, this.y + 14));
          }
          GameState.stats.rings = 0;
          GameState.scrShake = 12;
          this.inv = CFG.IFRAMES;
          this.vy = -4; this.vx = -this.face * CFG.KNOCKBACK;
          AudioSys.scatter();
          FX.spawn(this.x + 9, this.y + 14, '#ff0', 25, { speed: 6, life: 1.2 });
        } else {
          this.lives--;
          if (this.lives <= 0) {
            this.alive = false;
            AudioSys.gameOver();
            FX.spawn(this.x + 9, this.y + 14, '#f44', 40, { speed: 8, life: 1.5 });
          } else {
            this.inv = CFG.IFRAMES * 2;
            this.vy = -6; this.vx = -this.face * 6;
            AudioSys.hit();
            FX.spawn(this.x + 9, this.y + 14, '#f84', 20, { speed: 5 });
          }
          GameState.scrShake = 25;
        }
      }

      draw(ctx, camX, camY) {
        if (!this.alive) return;
        if (this.inv > 0 && Math.floor(Date.now() / 40) % 2 === 0) return;

        ctx.save();
        ctx.translate(this.x + 9, this.y + 14);

        let scY = 1, rot = 0;
        if (this.dashTime > 0) { scY = 0.5; rot = this.face * 0.8; }
        else if (!this.onGround) { scY = 1.15; }

        ctx.rotate(rot);
        ctx.scale(this.face, 1);

        // Shield aura
        if (this.shield) {
          ctx.strokeStyle = '#0f8';
          ctx.lineWidth = 2;
          ctx.shadowColor = '#0f8';
          ctx.shadowBlur = 10 + Math.sin(Date.now() / 100) * 5;
          ctx.beginPath();
          ctx.arc(0, 0, 22 + Math.sin(Date.now() / 150) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Speed trail
        if (this.speedBoost > 0) {
          ctx.fillStyle = 'rgba(255, 200, 0, 0.3)';
          ctx.fillRect(-25, -15, 10, 30);
        }

        // Body
        ctx.fillStyle = '#0ff';
        ctx.shadowColor = this.shield ? '#0f8' : '#0ff';
        ctx.shadowBlur = this.shield ? 20 : 15;
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(-9, -14 * scY, 18, 28 * scY, 6);
        } else {
          ctx.rect(-9, -14 * scY, 18, 28 * scY);
        }
        ctx.fill();

        // Visor
        ctx.fillStyle = '#fff';
        ctx.fillRect(2, -10, 10, 10);
        ctx.fillStyle = this.dashTime > 0 ? '#f0f' : '#000';
        ctx.fillRect(7, -7, 5, 5);

        // Double jump indicator
        if (this.hasDoubleJump && !this.doubleJump) {
          ctx.fillStyle = '#ff0';
          ctx.beginPath();
          ctx.arc(-5, -20, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Shoes
        if (this.dashTime <= 0) {
          ctx.fillStyle = this.speedBoost > 0 ? '#fa0' : '#f44';
          ctx.fillRect(-7, 12, 6, 5);
          ctx.fillRect(1, 12, 6, 5);
        }

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // --- ENEMY ---
    class Enemy extends Entity {
      constructor(cfg) {
        super(cfg.x, cfg.y, 24, 24);
        this.type = cfg.type;
        this.startX = cfg.x; this.startY = cfg.y;
        this.timer = Math.random() * 100;
        this.hp = 1;
        this.flash = 0;

        switch (this.type) {
          case 'eel': this.w = 32; this.h = 16; this.vx = -2.5; break;
          case 'jelly': this.w = 28; this.h = 28; break;
          case 'turret': this.w = 20; this.h = 30; this.shootTimer = 0; break;
          case 'shark': this.w = 48; this.h = 24; this.vx = -4; break;
          case 'leviathan': this.w = 120; this.h = 80; this.hp = 20; this.phase = 0; break;
        }
      }

      update(player, platforms, projectiles) {
        if (!this.alive) return;
        this.timer++;
        if (this.flash > 0) this.flash--;

        switch (this.type) {
          case 'eel':
            this.x += this.vx;
            if (Math.abs(this.x - this.startX) > 180) this.vx *= -1;
            break;
          case 'jelly':
            this.y = this.startY + Math.sin(this.timer * 0.05) * 50;
            break;
          case 'shark':
            this.x += this.vx;
            if (Math.abs(this.x - this.startX) > 300) this.vx *= -1;
            break;
          case 'turret':
            this.shootTimer++;
            if (this.shootTimer > 120 && Math.abs(player.x - this.x) < 400) {
              const dx = (player.x + 9) - (this.x + 10);
              const dy = (player.y + 14) - (this.y + 15);
              const d = Math.hypot(dx, dy);
              projectiles.push(new Projectile(this.x + 10, this.y + 15, (dx / d) * 5, (dy / d) * 5, 'enemy'));
              this.shootTimer = 0;
            }
            break;
          case 'leviathan':
            // Boss AI
            this.y = this.startY + Math.sin(this.timer * 0.03) * 60;
            if (this.timer % 90 === 0) {
              projectiles.push(new Projectile(this.x, this.y + 40, -5, 0, 'enemy'));
              projectiles.push(new Projectile(this.x, this.y + 40, -4, 2, 'enemy'));
              projectiles.push(new Projectile(this.x, this.y + 40, -4, -2, 'enemy'));
            }
            if (this.timer % 180 === 0) {
              projectiles.push(new Projectile(this.x + 60, this.y + 40, -6, 0, 'enemy'));
            }
            break;
        }

        // Player collision
        if (player.alive && player.inv <= 0 && AABB(this, player)) {
          if (player.dashTime > 0 || (player.vy > 0 && player.y + player.h < this.y + this.h * 0.4)) {
            this.takeDamage();
            if (player.dashTime <= 0) player.vy = CFG.JUMP_FORCE * 0.7;
          } else {
            player.takeDamage();
          }
        }
      }

      takeDamage() {
        this.hp--;
        this.flash = 10;
        if (this.type === 'leviathan') {
          AudioSys.bossHit();
          GameState.scrShake = 8;
        } else {
          AudioSys.enemyHit();
        }
        FX.spawn(this.x + this.w / 2, this.y + this.h / 2, '#fff', 8);

        if (this.hp <= 0) {
          this.alive = false;
          AudioSys.enemyDie();
          FX.spawn(this.x + this.w / 2, this.y + this.h / 2, this.type === 'leviathan' ? '#f0f' : '#f44',
            this.type === 'leviathan' ? 50 : 20, { speed: 6, life: 1 });
          if (this.type === 'leviathan') {
            GameState.bossDefeated = true;
            GameState.levelCompleteTimer = 120;
          }
        }
      }

      draw(ctx, camX, camY) {
        if (!this.alive) return;

        if (this.flash > 0) {
          ctx.globalAlpha = 0.5;
        }

        const colors = {
          eel: '#66ff00', jelly: '#ff66ff', turret: '#ff4444',
          shark: '#8888ff', leviathan: '#aa00aa'
        };

        ctx.fillStyle = colors[this.type];
        ctx.shadowColor = colors[this.type];
        ctx.shadowBlur = this.type === 'leviathan' ? 25 : 15;

        ctx.beginPath();
        if (this.type === 'eel' || this.type === 'shark') {
          if (ctx.roundRect) {
            ctx.roundRect(this.x, this.y, this.w, this.h, 8);
          } else {
            ctx.rect(this.x, this.y, this.w, this.h);
          }
        } else {
          ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w / 2, 0, Math.PI * 2);
        }
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#fff';
        if (this.type === 'leviathan') {
          ctx.fillRect(this.x + 20, this.y + 20, 20, 20);
          ctx.fillRect(this.x + 80, this.y + 20, 20, 20);
          ctx.fillStyle = '#f00';
          ctx.beginPath();
          ctx.arc(this.x + 30, this.y + 30, 6, 0, Math.PI * 2);
          ctx.arc(this.x + 90, this.y + 30, 6, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(this.x + this.w / 2 - 6, this.y + this.h / 2 - 4, 5, 0, Math.PI * 2);
          ctx.arc(this.x + this.w / 2 + 6, this.y + this.h / 2 - 4, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#f00';
          ctx.beginPath();
          ctx.arc(this.x + this.w / 2 - 6, this.y + this.h / 2 - 4, 2, 0, Math.PI * 2);
          ctx.arc(this.x + this.w / 2 + 6, this.y + this.h / 2 - 4, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        // HP bar for boss
        if (this.type === 'leviathan') {
          const hpPct = this.hp / 20;
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x, this.y - 20, this.w, 8);
          ctx.fillStyle = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
          ctx.fillRect(this.x, this.y - 20, this.w * hpPct, 8);
        }

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    // --- GAME STATE ---
    const GameState = {
      state: STATE.TITLE,
      currentLevel: 0,
      stats: { time: 0, deaths: 0, rings: 0, score: 0 },
      cam: { x: 0, y: 0 },
      scrShake: 0, bossDefeated: false, levelCompleteTimer: 0,

      player: new Player(),
      enemies: [], rings: [], scatteredRings: [], powerups: [], projectiles: [],

      initLevel(lvl = 0) {
        this.currentLevel = lvl;
        const level = LEVELS[lvl];
        this.enemies = level.enemies.map(e => new Enemy(e));
        if (level && level.boss) {
          this.enemies.push(new Enemy(level.boss));
        }
        this.rings = level.rings.map(p => ({ ...p, col: false, vx: 0, vy: 0 }));
        this.scatteredRings = [];
        this.powerups = (level.powerups || []).map(p => new PowerUp(p));
        this.projectiles = [];
        this.player.reset(level.spawn.x, level.spawn.y);
        this.player.hasDoubleJump = false;
        this.cam.x = this.player.x - CFG.W / 2;
        this.cam.y = this.player.y - CFG.H / 2;
        this.bossDefeated = false;
        this.levelCompleteTimer = 0;
      },

      togglePause() {
        if (this.state === STATE.PLAY) this.state = STATE.PAUSE;
        else if (this.state === STATE.PAUSE) this.state = STATE.PLAY;
      },

      resetToCheckpoint() {
        const level = LEVELS[this.currentLevel];
        let cp = level.spawn;
        for (let c of level.checkpoints) {
          if (this.player.x >= c.x) cp = c;
        }
        this.player.reset(cp.x, cp.y);
        this.player.hasDoubleJump = false;
        this.scatteredRings = [];
        this.projectiles = [];
      },

      nextLevel() {
        if (this.currentLevel < LEVELS.length - 1) {
          this.currentLevel++;
          this.initLevel(this.currentLevel);
          this.state = STATE.PLAY;
        } else {
          this.state = STATE.WIN;
        }
      },

      update() {
        Input.postUpdate();
        Input.update();

        if (this.state === STATE.TITLE) {
          if (Input.justPressed('Jump')) {
            this.state = STATE.MODE_SELECT;
            this.menuIdx = 0;
          }
        } else if (this.state === STATE.MODE_SELECT) {
          if (Input.justPressed('Jump')) {
             this.selectedMode = this.menuIdx;
             this.state = STATE.CHAR_SELECT;
             this.menuIdx = 0;
          }
          if (Input.justPressed('Dash')) this.menuIdx = (this.menuIdx + 1) % MODES.length;
        } else if (this.state === STATE.CHAR_SELECT) {
          if (Input.justPressed('Jump')) {
             this.selectedChar = this.menuIdx;
             this.stats = { time: 0, deaths: 0, rings: 0, score: 0 };
             this.initLevel(0);
             this.state = STATE.PLAY;
          }
          if (Input.justPressed('Dash')) this.menuIdx = (this.menuIdx + 1) % CHARACTERS.length;
        } else if (this.state === STATE.PLAY) {
          this.stats.time++;
          const level = LEVELS[this.currentLevel];

          this.player.update(level.platforms, level.hazards, level.springs);

          // Update enemies
          for (let e of this.enemies) e.update(this.player, level.platforms, this.projectiles);

          // Update projectiles
          for (let i = this.projectiles.length - 1; i >= 0; i--) {
            let p = this.projectiles[i];
            p.update(level.platforms);
            if (!p.alive) { this.projectiles.splice(i, 1); continue; }

            if (p.owner === 'enemy' && this.player.alive && this.player.inv <= 0 && AABB(p, this.player)) {
              p.alive = false;
              if (this.player.shield) { this.player.shield = false; this.player.inv = 60; }
              else this.player.takeDamage();
            }
          }

          // Collect rings
          for (let r of this.rings) {
            if (!r.col && AABB(this.player, { x: r.x - 7, y: r.y - 7, w: 14, h: 14 })) {
              r.col = true; this.stats.rings++;
              this.stats.score += 10;
              if (this.stats.rings % 100 === 0) {
                this.player.lives = Math.min(this.player.maxLives, this.player.lives + 1);
                AudioSys.extraLife();
              } else {
                AudioSys.ringCollect();
              }
              FX.spawn(r.x, r.y, '#ffd700', 6, { speed: 2, life: 0.5 });
            }
          }

          // Collect scattered rings
          for (let i = this.scatteredRings.length - 1; i >= 0; i--) {
            let sr = this.scatteredRings[i];
            sr.update(level.platforms);
            if (!sr.alive) { this.scatteredRings.splice(i, 1); continue; }
            if (sr.timer < 170 && AABB(this.player, sr)) {
              this.stats.rings++; this.stats.score += 10;
              AudioSys.pickup();
              FX.spawn(sr.x + 7, sr.y + 7, '#ffd700', 4);
              this.scatteredRings.splice(i, 1);
            }
          }

          // Power-ups
          for (let p of this.powerups) {
            p.update();
            if (!p.collected && AABB(this.player, { x: p.x, y: p.y, w: 24, h: 24 })) {
              p.collected = true;
              AudioSys.powerUp();
              this.stats.score += 50;
              switch (p.type) {
                case 'SHIELD': this.player.shield = true; break;
                case 'MAGNET': this.player.magnet = true; break;
                case 'SPEED': this.player.speedBoost = 300; break;
                case 'DOUBLE_JUMP': this.player.hasDoubleJump = true; break;
                case 'EXTRA_LIFE': this.player.lives = Math.min(this.player.maxLives, this.player.lives + 1); break;
              }
            }
          }

          // Checkpoints
          for (let cp of level.checkpoints) {
            if (AABB(this.player, { x: cp.x - 10, y: cp.y - 60, w: 30, h: 100 })) {
              AudioSys.checkpoint();
              FX.spawn(cp.x, cp.y - 30, '#0f0', 15);
            }
          }

          // Goal reach (for non-boss levels)
          if (!level.boss && this.player.x > level.w - 180 && !this.bossDefeated) {
            this.bossDefeated = true;
            this.levelCompleteTimer = 120;
          }

          // Level completion
          if (this.bossDefeated && this.levelCompleteTimer > 0) {
            this.levelCompleteTimer--;
            if (this.levelCompleteTimer <= 0) {
              AudioSys.levelComplete();
              this.nextLevel();
            }
          }

          // Fall death
          if (this.player.y > level.h + 150) this.player.alive = false;

          // Death handling
          if (!this.player.alive && this.player.lives <= 0) {
            this.stats.deaths++;
            this.state = STATE.DEAD;
            this.deathTimer = 120;
          } else if (!this.player.alive) {
            this.stats.deaths++;
            this.state = STATE.DEAD;
            this.deathTimer = 60;
          }

          FX.update();
          if (this.scrShake > 0) this.scrShake--;
          if (Math.random() < 0.02) FX.spawnBubble(this.player.x + Math.random() * 20, this.player.y);

          // Camera
          let tx = this.player.x - CFG.W / 2 + this.player.vx * 5;
          let ty = this.player.y - CFG.H / 2 + 60 + this.player.vy * 3;
          tx = clamp(tx, 0, level.w - CFG.W);
          ty = clamp(ty, 0, level.h - CFG.H);
          this.cam.x = lerp(this.cam.x, tx, 0.12);
          this.cam.y = lerp(this.cam.y, ty, 0.1);

        } else if (this.state === STATE.DEAD) {
          FX.update();
          if (this.deathTimer > 0) {
            this.deathTimer--;
          } else if (Input.justPressed('Jump')) {
            if (this.player.lives > 0) {
              this.resetToCheckpoint();
              this.state = STATE.PLAY;
            } else {
              this.state = STATE.TITLE;
            }
          }
        } else if (this.state === STATE.PAUSE) {
          if (Input.justPressed('Jump')) this.state = STATE.PLAY;
        } else if (this.state === STATE.WIN) {
          if (Input.justPressed('Jump')) this.state = STATE.TITLE;
        }

        Input.postUpdate();
      },

      draw(ctx) {
        let cx = this.cam.x, cy = this.cam.y;
        if (this.scrShake > 0) {
          cx += (Math.random() - 0.5) * this.scrShake;
          cy += (Math.random() - 0.5) * this.scrShake;
        }

        // Background
        const gradient = ctx.createLinearGradient(0, 0, 0, CFG.H);
        gradient.addColorStop(0, '#001020');
        gradient.addColorStop(0.5, '#002040');
        gradient.addColorStop(1, '#001030');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, CFG.W, CFG.H);

        // Deep sea caustics effect
        ctx.save();
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = '#0af';
        const time = Date.now() / 2000;
        for (let i = 0; i < 8; i++) {
          const y = (i * 80 + Math.sin(time + i) * 30) % (CFG.H + 100) - 50;
          ctx.beginPath();
          ctx.moveTo(0, y);
          for (let x = 0; x <= CFG.W; x += 50) {
            ctx.lineTo(x, y + Math.sin(x / 200 + time + i * 0.5) * 20);
          }
          ctx.lineTo(CFG.W, CFG.H);
          ctx.lineTo(0, CFG.H);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(-Math.floor(cx), -Math.floor(cy));
        const level = LEVELS[this.currentLevel] || LEVELS[0];

        // Platforms
        for (let p of level.platforms) {
          if (p.x > cx + CFG.W || p.x + p.w < cx) continue;
          const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
          grad.addColorStop(0, '#0a2a4a');
          grad.addColorStop(1, '#051525');
          ctx.fillStyle = grad;
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeStyle = '#0af';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.x, p.y, p.w, p.h);
          ctx.fillStyle = '#0cf';
          ctx.globalAlpha = 0.3;
          ctx.fillRect(p.x, p.y, p.w, 4);
          ctx.globalAlpha = 1;
        }

        // Hazards
        for (let h of level.hazards) {
          if (h.x > cx + CFG.W || h.x + h.w < cx) continue;
          ctx.fillStyle = '#600';
          ctx.fillRect(h.x, h.y, h.w, h.h);
          ctx.fillStyle = '#f44';
          const spikeOffset = Math.sin(Date.now() / 100) * 2;
          for (let i = 0; i < h.w; i += 10) {
            ctx.beginPath();
            ctx.moveTo(h.x + i, h.y + h.h);
            ctx.lineTo(h.x + i + 5, h.y + spikeOffset);
            ctx.lineTo(h.x + i + 10, h.y + h.h);
            ctx.fill();
          }
        }

        // Springs
        for (let s of level.springs) {
          if (s.x > cx + CFG.W || s.x + 30 < cx) continue;
          const bounce = Math.sin(Date.now() / 200 + s.x) * 3;
          ctx.fillStyle = '#c40';
          ctx.fillRect(s.x, s.y, 30, 8);
          ctx.fillStyle = '#fc0';
          ctx.fillRect(s.x + 2, s.y - 6 + bounce, 26, 6);
          ctx.fillStyle = '#fff';
          ctx.fillRect(s.x + 5, s.y - 12 + bounce * 1.5, 20, 4);
        }

        // Checkpoints
        for (let cp of level.checkpoints) {
          const activated = this.player.x >= cp.x;
          ctx.fillStyle = activated ? '#0f8' : '#444';
          ctx.shadowColor = activated ? '#0f8' : 'transparent';
          ctx.shadowBlur = activated ? 15 : 0;
          ctx.fillRect(cp.x - 2, cp.y - 70, 4, 70);
          ctx.beginPath();
          ctx.moveTo(cp.x, cp.y - 70);
          ctx.lineTo(cp.x + 15, cp.y - 55);
          ctx.lineTo(cp.x, cp.y - 40);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Goal Signpost (for levels without a boss)
        if (!level.boss) {
          const lastPlat = level.platforms[level.platforms.length - 1];
          const goalX = level.w - 120;
          const goalY = lastPlat ? lastPlat.y - 100 : level.h - 200;
          const pulse = (Math.sin(Date.now() / 250) + 1) / 2;
          
          ctx.save();
          ctx.translate(goalX, goalY);
          ctx.strokeStyle = '#0ff';
          ctx.lineWidth = 4;
          ctx.shadowColor = '#0ff';
          ctx.shadowBlur = 15 + pulse * 10;
          ctx.beginPath();
          ctx.arc(0, 0, 40 + pulse * 5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = '#0ff';
          ctx.textAlign = 'center';
          ctx.font = 'bold 18px "Courier New"';
          ctx.fillText('FINISH', 0, 6);
          ctx.restore();
        }

        // Rings
        const rTime = Date.now() / 120;
        for (let r of this.rings) {
          if (r.col) continue;
          const rx = r.x + (r.vx || 0);
          const ry = r.y + (r.vy || 0) + Math.sin(rTime + r.x) * 4;
          const rw = Math.max(2, Math.abs(Math.cos(rTime + r.x)) * 10);

          ctx.strokeStyle = '#ff0';
          ctx.lineWidth = 3;
          ctx.shadowColor = '#fa0';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.ellipse(rx, ry, rw, 10, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        // Scattered rings
        for (let r of this.scatteredRings) {
          if (r.blink) continue;
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(r.x + 7, r.y + 7, 6, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Power-ups
        for (let p of this.powerups) p.draw(ctx, cx, cy);

        // Enemies
        for (let e of this.enemies) e.draw(ctx, cx, cy);

        // Projectiles
        for (let p of this.projectiles) p.draw(ctx, cx, cy);

        // Player
        if (this.state === STATE.PLAY || (this.state === STATE.DEAD && this.deathTimer > 30)) {
          this.player.draw(ctx, cx, cy);
        }

        FX.draw(ctx, cx, cy);
        ctx.restore();

        // UI
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px "Courier New", monospace';

        if (this.state === STATE.TITLE) {
          ctx.textAlign = 'center';
          ctx.font = 'bold 64px "Courier New"';
          ctx.fillStyle = '#0af';
          ctx.shadowColor = '#0af';
          ctx.shadowBlur = 30;
          ctx.fillText('ABYSSAL RUSH', CFG.W / 2, CFG.H / 2 - 50);
          ctx.font = 'bold 32px "Courier New"';
          ctx.fillStyle = '#0ff';
          ctx.fillText('DEEP DIVE', CFG.W / 2, CFG.H / 2);
          ctx.shadowBlur = 0;
          ctx.font = '20px "Courier New"';
          ctx.fillStyle = '#fff';
          if (Math.floor(Date.now() / 500) % 2 === 0) {
            ctx.fillText('PRESS JUMP TO DIVE', CFG.W / 2, CFG.H / 2 + 60);
          }
          ctx.font = '14px Arial';
          ctx.fillStyle = '#88ccff';
          ctx.fillText('Collect 100 rings for an extra life!', CFG.W / 2, CFG.H - 40);
          ctx.fillText('Defeat the Leviathan to win!', CFG.W / 2, CFG.H - 20);
        } else if (this.state === STATE.PLAY || this.state === STATE.PAUSE || this.state === STATE.DEAD) {
          ctx.textAlign = 'left';

          // Lives
          ctx.fillStyle = '#f44';
          ctx.font = 'bold 20px Arial';
          for (let i = 0; i < this.player.lives; i++) {
            ctx.fillText('♥', 20 + i * 25, 30);
          }

          // Rings
          ctx.fillStyle = this.stats.rings === 0 ? '#f88' : '#ff0';
          ctx.font = 'bold 22px "Courier New"';
          ctx.fillText(`RINGS ${this.stats.rings.toString().padStart(3, '0')}`, 20, 60);

          // Score
          ctx.fillStyle = '#0ff';
          ctx.fillText(`SCORE ${this.stats.score.toString().padStart(6, '0')}`, 20, 90);

          // Time
          let m = Math.floor(this.stats.time / 3600);
          let s = Math.floor(this.stats.time / 60) % 60;
          let ms = Math.floor((this.stats.time % 60) * (1000 / 60));
          ctx.fillStyle = '#fff';
          ctx.fillText(`TIME ${m}:${s.toString().padStart(2, '0')}`, CFG.W - 180, 30);

          // Power-up indicators
          let px = CFG.W - 150;
          if (this.player.shield) {
            ctx.fillStyle = '#0f8';
            ctx.fillText('SHIELD', px, 60);
          }
          if (this.player.magnet) {
            ctx.fillStyle = '#f6f';
            ctx.fillText('MAGNET', px, this.player.shield ? 85 : 60);
          }
          if (this.player.speedBoost > 0) {
            ctx.fillStyle = '#fa0';
            ctx.fillText('SPEED', px, 60 + (this.player.shield ? 25 : 0) + (this.player.magnet ? 25 : 0));
          }

          // Level indicator
          ctx.textAlign = 'center';
          ctx.fillStyle = '#0af';
          ctx.fillText(`LEVEL ${this.currentLevel + 1} / ${LEVELS.length}`, CFG.W / 2, 30);

          // Pause overlay
          if (this.state === STATE.PAUSE) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, CFG.W, CFG.H);
            ctx.textAlign = 'center';
            ctx.font = 'bold 48px "Courier New"';
            ctx.fillStyle = '#0af';
            ctx.fillText('PAUSED', CFG.W / 2, CFG.H / 2);
            ctx.font = '20px "Courier New"';
            ctx.fillStyle = '#fff';
            ctx.fillText('Press JUMP to resume', CFG.W / 2, CFG.H / 2 + 50);
          }

          // Death overlay
          if (this.state === STATE.DEAD) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, CFG.W, CFG.H);
            ctx.textAlign = 'center';
            ctx.font = 'bold 48px "Courier New"';
            if (this.player.lives <= 0) {
              ctx.fillStyle = '#f44';
              ctx.fillText('GAME OVER', CFG.W / 2, CFG.H / 2);
              ctx.font = '20px "Courier New"';
              ctx.fillStyle = '#fff';
              ctx.fillText('Press JUMP to return to title', CFG.W / 2, CFG.H / 2 + 60);
            } else {
              ctx.fillStyle = '#f84';
              ctx.fillText('HIT!', CFG.W / 2, CFG.H / 2);
              ctx.font = '20px "Courier New"';
              ctx.fillStyle = '#fff';
              ctx.fillText(`Lives: ${this.player.lives}`, CFG.W / 2, CFG.H / 2 + 50);
            }
          }
        } else if (this.state === STATE.WIN) {
          ctx.fillStyle = 'rgba(0,20,40,0.85)';
          ctx.fillRect(0, 0, CFG.W, CFG.H);
          ctx.textAlign = 'center';
          ctx.font = 'bold 56px "Courier New"';
          ctx.fillStyle = '#0f8';
          ctx.shadowColor = '#0f8';
          ctx.shadowBlur = 25;
          ctx.fillText('MISSION COMPLETE!', CFG.W / 2, CFG.H / 2 - 80);
          ctx.shadowBlur = 0;
          ctx.font = '24px "Courier New"';
          ctx.fillStyle = '#ff0';
          ctx.fillText(`FINAL SCORE: ${this.stats.score}`, CFG.W / 2, CFG.H / 2 - 10);
          ctx.fillStyle = '#fff';
          ctx.fillText(`RINGS: ${this.stats.rings}`, CFG.W / 2, CFG.H / 2 + 30);
          let tStr = Math.floor(this.stats.time / 3600) + ':' + (Math.floor(this.stats.time / 60) % 60).toString().padStart(2, '0');
          ctx.fillText(`TIME: ${tStr}`, CFG.W / 2, CFG.H / 2 + 65);
          ctx.fillStyle = '#0af';
          ctx.fillText(`DEATHS: ${this.stats.deaths}`, CFG.W / 2, CFG.H / 2 + 100);
          if (Math.floor(Date.now() / 500) % 2 === 0) {
            ctx.fillStyle = '#fff';
            ctx.fillText('PRESS JUMP TO PLAY AGAIN', CFG.W / 2, CFG.H / 2 + 150);
          }
        }
      }
    };

    // --- MAIN LOOP ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    Input.bind();

    let lastTime = performance.now();
    let accumulator = 0;
    const TIME_STEP = 1000 / 60;

    function frame(time) {
      let dt = time - lastTime;
      lastTime = time;
      if (dt > 250) dt = 250;

      accumulator += dt;
      while (accumulator >= TIME_STEP) {
        GameState.update();
        accumulator -= TIME_STEP;
      }

      GameState.draw(ctx);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
