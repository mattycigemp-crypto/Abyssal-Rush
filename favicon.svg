<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0f172a"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#waveGrad)" stroke-width="3"/>
  <!-- Wave design -->
  <path d="M15 55 Q25 45, 35 55 T55 55 T75 55" fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M20 65 Q30 55, 40 65 T60 65 T80 65" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Bubbles -->
  <circle cx="70" cy="30" r="6" fill="url(#bubbleGrad)" opacity="0.8"/>
  <circle cx="80" cy="42" r="4" fill="url(#bubbleGrad)" opacity="0.6"/>
  <circle cx="25" cy="35" r="3" fill="url(#bubbleGrad)" opacity="0.5"/>
</svg>
