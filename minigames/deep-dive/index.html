<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deep Dive | Abyssal Rush</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Modern Game Header -->
  <header class="game-header">
    <a href="/" class="header-logo">
      <span class="logo-icon">🌊</span>
      <span class="logo-text">ABYSSAL RUSH</span>
    </a>
    <nav class="header-nav">
      <a href="/nebula-rider" class="nav-link">🌌 Nebula Rider</a>
      <a href="/space-shooter" class="nav-link">🚀 Nova Siege</a>
      <a href="/pool" class="nav-link">🎱 Pool</a>
      <a href="/night-drive" class="nav-link">🏎️ Night Drive</a>
      <a href="/deep-dive" class="nav-link nav-home">🤿 Deep Dive</a>
    </nav>
    <div id="user-badge" style="display: none;">
      <span class="sync-status" id="sync-status"></span>
      <span id="username-display">Guest</span>
    </div>
  </header>

  <div id="wrap">
    <canvas id="c" width="1280" height="720" tabindex="0"></canvas>

    <div id="mobile-controls">
      <div class="ctrl-group">
        <button class="btn" id="bleft">◀</button>
        <button class="btn" id="bright">▶</button>
      </div>
      <div class="ctrl-group">
        <button class="btn action" id="bdash">◆</button>
        <button class="btn" id="bjump">▲</button>
        <button class="btn" id="bemote">☺</button>
      </div>
    </div>
  </div>
  <div id="hint">DETECTING DEVICE...</div>

  <!-- Modules -->
  <script src="/js/config.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/input.js"></script>
  <script src="/js/particles.js"></script>
  <script src="/js/entities.js"></script>
  <script src="/js/levels.js"></script>
  <script src="/js/shop.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/game.js"></script>
  <script src="/js/main.js"></script>

  <!-- Auth Event Listeners -->
  <script>
    function updateUserBadge() {
      const badge = document.getElementById('user-badge');
      const username = document.getElementById('username-display');
      const syncStatus = document.getElementById('sync-status');

      if (Auth.isLoggedIn && Auth.user) {
        badge.style.display = 'flex';
        username.textContent = Auth.user.username;
        syncStatus.className = 'sync-status';
      } else {
        badge.style.display = 'none';
      }
    }

    // Listen for auth state changes
    window.addEventListener('auth:login', updateUserBadge);
    window.addEventListener('auth:logout', () => {
      document.getElementById('user-badge').style.display = 'none';
    });
  </script>

  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
